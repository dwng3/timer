<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>홀덤 타이머</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #007bff;
  font-family: Arial, Helvetica, sans-serif;
}

#timer {
  font-size: 30vw;
  font-weight: 900;
  color: white;
  text-shadow: 0 0 20px rgba(0,0,0,0.6);
}

#settingsBtn {
  position: fixed;
  top: 18px;
  right: 18px;
  z-index: 20;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.7);
  background: rgba(0,0,0,0.35);
  color: white;
  font-size: 26px;
}

#settingsPanel {
  position: fixed;
  top: 84px;
  right: 18px;
  z-index: 20;
  padding: 16px;
  border-radius: 14px;
  background: rgba(0,0,0,0.72);
  color: white;
  display: none;
}

#settingsPanel.show {
  display: block;
}

#settingsPanel label {
  display: block;
  margin-bottom: 8px;
  font-size: 15px;
}

#timeSelect {
  font-size: 22px;
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<button id="settingsBtn" type="button">⚙</button>

<div id="settingsPanel">
  <label for="timeSelect">타이머 시간</label>
  <select id="timeSelect">
    <option value="30">30초</option>
    <option value="60">1분</option>
    <option value="90">1분 30초</option>
    <option value="120">2분</option>
  </select>
</div>

<div id="timer">30</div>

<script>
let totalSeconds = Number(localStorage.getItem("holdemTimerSeconds") || 30);

const BLUE = "#007bff";
const BLACK = "#000000";

const timerEl = document.getElementById("timer");
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const timeSelect = document.getElementById("timeSelect");

let startTime = null;
let animationId = null;

timeSelect.value = String(totalSeconds);
timerEl.textContent = totalSeconds;

function update(now) {
  const elapsed = (now - startTime) / 1000;
  const remaining = Math.max(totalSeconds - elapsed, 0);

  timerEl.textContent = Math.ceil(remaining);

  const progress = Math.min(elapsed / totalSeconds, 1);
  const angle = progress * 360;

  document.body.style.background = `
    conic-gradient(
      ${BLACK} 0deg ${angle}deg,
      ${BLUE} ${angle}deg 360deg
    )
  `;

  if (remaining > 0) {
    animationId = requestAnimationFrame(update);
  } else {
    timerEl.textContent = "0";
    document.body.style.background = BLACK;
  }
}

function startTimer() {
  cancelAnimationFrame(animationId);
  startTime = performance.now();
  animationId = requestAnimationFrame(update);
}

function isSettingsArea(target) {
  return (
    target.closest("#settingsPanel") ||
    target.closest("#settingsBtn")
  );
}

settingsBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  settingsPanel.classList.toggle("show");
});

settingsBtn.addEventListener("touchstart", (e) => {
  e.stopPropagation();
}, { passive: false });

settingsPanel.addEventListener("click", (e) => {
  e.stopPropagation();
});

settingsPanel.addEventListener("touchstart", (e) => {
  e.stopPropagation();
}, { passive: false });

timeSelect.addEventListener("change", () => {
  totalSeconds = Number(timeSelect.value);
  localStorage.setItem("holdemTimerSeconds", totalSeconds);
  timerEl.textContent = totalSeconds;
  startTimer();
});

document.body.addEventListener("click", (e) => {
  if (isSettingsArea(e.target)) return;

  settingsPanel.classList.remove("show");
  startTimer();
});

document.body.addEventListener("touchstart", (e) => {
  if (isSettingsArea(e.target)) return;

  settingsPanel.classList.remove("show");
  startTimer();
});

startTimer();
</script>

</body>
</html>
